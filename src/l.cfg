Package lParser;

Helpers

lettre = [['a' .. 'z'] + ['A' .. 'Z']];
chiffre = ['0' .. '9'];
alpha = [lettre + ['_' + '$']];
alphanum = [lettre + chiffre];

Tokens

espaces = (' ' | 13 | 10)+;
commentaire= '#' [[0 .. 0xffff] - [10 + 13]]* (10 | 13 | 10 13);
plus = '+';
nombre = chiffre+;
ou = '|';
et = '&';
egal = '=';
less = '<';
moins = '-';
multi = '*';
divis = '/';
non = '!';
po = '(';
pf = ')';
vrai = 'Vrai';
faux = 'Faux';
pv = ';';
tq = 'tantque';
faire = 'faire';
si = 'si';
alors = 'alors';
sinon = 'sinon';
retour = 'retour';
ecrire = 'ecrire';
aco = '{';
acf = '}';
cro = '[';
crf = ']';
vir = ',';
entier = 'entier';
bool = 'bool';
id = lettre alphanum*;

Ignored Tokens

espaces, commentaire;

Productions

programme = ldv ldf ;

exp ={ou} exp ou exp1 |
     {next} exp1 ;
exp1={et} exp1 et exp2 |
     {next} exp2 ;
exp2={egal} exp2 egal exp3 |
     {less} exp2 less exp3 |
     {next} exp3 ;
exp3={add} exp3 plus exp4 |
     {sub} exp3 moins exp4 |
     {next} exp4 ;
exp4={multi} exp4 multi exp5 |
     {divis} exp4 divis exp5 |
     {next} exp5 ;
exp5={non} non exp6 |
     {next} exp6 ;
exp6={par} po exp1 pf |
     {num} nombre |
     {var} v |
     {appf} af |
     {vrai} vrai |
     {faux} faux ;

i = {affect} v egal exp pv |
    {tq} tq exp faire bi |
    {si} si exp alors bi |
    {sinon} si exp alors [oui]:bi sinon [non]:bi |
    {retour} retour exp pv |
    {appf} af pv |
    {ecrire} ecrire po exp pf pv ;
bi = aco li acf ;
li = {recur} li i |
     {vide} eps ;

eps = ;

dv = {var} type id |
     {tab} type id cro nombre crf ;
df = typeopt id po [param]:ldv pf [varloc]:ldv bi ;
ldv = {vide} eps |
      {prem} dv ldvb ;
ldvb = {vide} eps |
       {suite} vir dv ldvb ;
typeopt = {vide} eps |
          {type} type ;
type = {int} entier |
       {bool} bool ;
v = {var} id |
    {tab} id cro exp crf ;
af = id po le pf ;
le = {vide} eps |
     {prem} exp leb ;
leb = {vide} eps |
      {suite} vir exp leb ;
ldf = {vide} eps |
      {elem} df ldf ;
